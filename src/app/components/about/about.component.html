<section id="about" class="section-padding">
  <div class="container">
    <h2 class="section-title text-center mb-5">Sobre mí</h2>
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm p-4">
          <div class="row g-4 align-items-center">
            <div class="col-md-5 text-center">
              <img [src]="portfolio.photoUrl" [alt]="portfolio.name"
                   class="img-fluid rounded-3 about-photo"
                   onerror="this.src='https://via.placeholder.com/280x320/6c757d/ffffff?text=Foto'">
            </div>
            <div class="col-md-7">
              <h3 class="h4 mb-3">{{ portfolio.name }}</h3>
              <p class="text-muted mb-3">
                <i class="fas fa-map-marker-alt me-2"></i>{{ portfolio.location }}
              </p>
              <p class="mb-3">{{ portfolio.bio }}</p>
              <p class="mb-0">
                <i class="fas fa-envelope me-2 text-primary"></i>
                <a [href]="'mailto:' + portfolio.email">{{ portfolio.email }}</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
