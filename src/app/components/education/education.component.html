<section id="education" class="section-padding section-alt">
  <div class="container">
    <h2 class="section-title text-center mb-5">Formación</h2>
    <div class="row justify-content-center">
      <div class="col-lg-9">
        <div class="timeline">
          @for (edu of portfolio.education; track edu.institution + edu.startYear; let last = $last) {
            <div class="timeline-item" [class.last]="last">
              <div class="timeline-dot"></div>
              <div class="timeline-content card border-0 shadow-sm p-4">
                <div class="d-flex flex-wrap justify-content-between align-items-start mb-2">
                  <div>
                    <h3 class="h5 mb-1 fw-bold">{{ edu.degree }} en {{ edu.field }}</h3>
                    <h4 class="h6 text-primary mb-0">
                      <i class="fas fa-university me-1"></i>{{ edu.institution }}
                    </h4>
                  </div>
                  <span class="badge date-badge mt-1">
                    {{ edu.startYear }} — {{ edu.endYear ?? 'Actualidad' }}
                  </span>
                </div>
                @if (edu.description) {
                  <p class="mt-2 mb-0 text-muted">{{ edu.description }}</p>
                }
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
