<section id="skills" class="section-padding section-alt">
  <div class="container">
    <h2 class="section-title text-center mb-5">Habilidades</h2>
    <div class="row g-4">
      @for (category of categories; track category.key) {
        @if (hasCategory(category.key)) {
          <div class="col-md-6 col-lg-4">
            <div class="card border-0 shadow-sm h-100">
              <div class="card-body p-4">
                <h4 class="card-title h6 text-uppercase text-primary fw-bold mb-4">
                  {{ category.label }}
                </h4>
                @for (skill of skillsByCategory(category.key); track skill.name) {
                  <div class="skill-item mb-3">
                    <div class="d-flex justify-content-between mb-1">
                      <span class="skill-name fw-medium">{{ skill.name }}</span>
                      <span class="skill-level text-muted small">{{ skill.level }}%</span>
                    </div>
                    <div class="progress" style="height: 8px;">
                      <div class="progress-bar"
                           role="progressbar"
                           [style.width.%]="skill.level"
                           [attr.aria-valuenow]="skill.level"
                           aria-valuemin="0"
                           aria-valuemax="100">
                      </div>
                    </div>
                  </div>
                }
              </div>
            </div>
          </div>
        }
      }
    </div>
  </div>
</section>
